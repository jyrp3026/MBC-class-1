<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no">
    <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=b31be05c3ec74ec71171c03ee04ee617">

    </script>
</head>

<body>
    <script type="text/javascript">
        var marker = new kakao.maps.Marker({
    position: latlng
});

    marker.setMap(map);

        function MyPos() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(CurPosition, ErrorCallback);
            }
        }
        function CurPosition(position) {
            var lat = position.coords.latitude;
            var lng = position.coords.longitude;
            document.getElementById("result").innerHTML = "위도:" + lat + "경도:" + lng;
            var latlng = new kakao.maps.LatLng(lat, lng);
            var options = {
                center: latlng,
                level: 3
            };
            var map = new kakao.maps.Map(
                document.getElementById("map"),
                options
            );
            var marker = new kakao.maps.Marker({
                map: map,
                icon: markerIcon,
                title: "현재 위치",
                position: latlng
            });
        }
        function ErrorCallback(error) {
            switch (error.code) {
                case error.PERMISSION_DENIED:
                    document.getElementById("result").innerHTML = "현재 위치 정보에 대한 권한이 없습니다.";
                    break;
                case error.POSITION_UNAVAILABLE:
                    document.getElementById("result").innerHTML = "현재 위치 정보를 구할 수 없습니다.";
                    break;
                case error.TIMEOUT:
                    document.getElementById("result").innerHTML = "시간 제한을 초과했습니다.";
                    break;
            }
        }
    </script>
    <button onClick="MyPos()" type="button">현재 나의 위치</button>
    <div id="result"></div>
    <div id="map" style="width: 500px; height:500px"></div>
</body>

</html>
